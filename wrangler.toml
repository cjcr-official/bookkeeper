name = "bookkeeper"
main = "worker/push-cron.js"
compatibility_date = "2025-01-15"

# Serve index.html + sw.js + manifest.json + version.json + icons as static
# files. Worker's fetch() runs first; anything not handled there delegates to
# env.ASSETS.fetch() to serve the static file. See .assetsignore for what's
# excluded (wrangler.toml, worker source, docs, .git, etc.).
[assets]
directory = "./"
binding = "ASSETS"
not_found_handling = "single-page-application"

[triggers]
crons = ["* * * * *"]  # every minute — per-job reminders fire within ~30s on average

